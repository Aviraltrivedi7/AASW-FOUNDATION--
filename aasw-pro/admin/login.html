<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AASW Admin | Sign In</title>
<link rel="icon" type="image/png" href="/images/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@300;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: {
      "primary": "#94aaff", "primary-container": "#869cf0", "secondary": "#cb7bff", "secondary-container": "#6c169f",
      "tertiary": "#94bdff", "tertiary-container": "#7daffc",
      "background": "#0e0e0f", "surface": "#0e0e0f",
      "surface-container-lowest": "#000000", "surface-container-low": "#131314",
      "surface-container": "#19191b", "surface-container-high": "#201f21", "surface-container-highest": "#262627",
      "surface-variant": "#262627", "on-surface": "#ffffff", "on-surface-variant": "#adaaab",
      "on-primary": "#072776", "outline-variant": "#484849", "error": "#ff6e84",
    },
    fontFamily: { "headline": ["Manrope","sans-serif"], "body": ["Manrope","sans-serif"], "label": ["Space Grotesk","sans-serif"] }
  }}
}
</script>
<style>
  body { background-color: #0e0e0f; color: #ffffff; font-family: 'Manrope', sans-serif; }
  .aura-blue { background: radial-gradient(circle at top left, rgba(148, 170, 255, 0.12) 0%, transparent 50%); }
  .aura-violet { background: radial-gradient(circle at bottom right, rgba(203, 123, 255, 0.1) 0%, transparent 50%); }
  .text-gradient { background: linear-gradient(45deg, #94aaff, #cb7bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .glass { background: rgba(38, 38, 39, 0.4); backdrop-filter: blur(12px);  will-change: transform, backdrop-filter; transform: translateZ(0); }
  .btn-glow:hover { box-shadow: 0 0 30px rgba(148, 170, 255, 0.4); }
  .input-focus:focus { box-shadow: 0 0 0 2px rgba(148, 170, 255, 0.3); }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .float-anim { animation: float 6s ease-in-out infinite; }
</style>
    <link href="/css/tailwind-compiled.css" rel="stylesheet" />
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden relative">

<!-- Ambient Background -->
<div class="fixed inset-0 aura-blue pointer-events-none"></div>
<div class="fixed inset-0 aura-violet pointer-events-none"></div>

<!-- Login Card -->
<div class="w-full max-w-md mx-4 relative z-10">
  <!-- Logo & Header -->
  <div class="text-center mb-10">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full p-[2px] bg-gradient-to-tr from-primary via-secondary to-primary-container mb-6 float-anim">
      <div class="w-full h-full bg-[#0e0e0f] rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-primary text-3xl">admin_panel_settings</span>
      </div>
    </div>
    <h1 class="text-3xl font-headline font-extrabold text-white tracking-tight mb-2">Welcome Back</h1>
    <p class="text-on-surface-variant font-label text-sm">Sign in to AASW Foundation Admin Panel</p>
  </div>

  <!-- Login Form Card -->
  <div class="glass p-8 md:p-10 rounded-3xl border border-white/5 shadow-[0px_20px_60px_rgba(0,0,0,0.5)]">
    <!-- Error Message -->
    <div id="errorMsg" class="hidden mb-6 p-4 rounded-xl bg-error/10 border border-error/20 text-error text-sm flex items-center gap-3">
      <span class="material-symbols-outlined text-lg">error</span>
      <span id="errorText"></span>
    </div>

    <form id="loginForm" class="space-y-6">
      <div class="space-y-2">
        <label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Email Address</label>
        <input type="email" id="email" name="email" required autocomplete="username"
               class="input-focus w-full bg-surface-container-high border-none rounded-xl text-white py-3.5 px-4 focus:ring-2 focus:ring-primary placeholder:text-outline-variant transition-all"
               placeholder="admin@aaswfoundation.org"/>
      </div>
      <div class="space-y-2">
        <label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Password</label>
        <div class="relative">
          <input type="password" id="password" name="password" required autocomplete="current-password"
                 class="input-focus w-full bg-surface-container-high border-none rounded-xl text-white py-3.5 px-4 pr-12 focus:ring-2 focus:ring-primary placeholder:text-outline-variant transition-all"
                 placeholder="Enter your password"/>
          <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors">
            <span class="material-symbols-outlined text-xl" id="eye-icon">visibility_off</span>
          </button>
        </div>
      </div>

      <button type="submit" id="loginBtn"
              class="w-full py-4 rounded-xl bg-gradient-to-r from-primary via-primary to-secondary text-on-primary font-bold font-label uppercase tracking-widest text-sm btn-glow transition-all active:scale-[0.98]">
        Sign In
      </button>
    </form>

    <div class="mt-8 flex justify-between items-center">
      <a href="/" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-label text-xs uppercase tracking-wider">
        <span class="material-symbols-outlined text-lg">arrow_back</span>
        Back to Website
      </a>
      <div class="flex items-center gap-2 font-label text-xs text-on-surface-variant">
        <span class="material-symbols-outlined text-primary text-lg">lock</span>
        Secured
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="mt-8 text-center">
    <p class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/40">© 2026 AASW Foundation Admin</p>
  </div>
</div>

<script>
// Toggle Password Visibility
document.getElementById('toggle-password')?.addEventListener('click', () => {
  const pwd = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.textContent = 'visibility';
  } else {
    pwd.type = 'password';
    icon.textContent = 'visibility_off';
  }
});

// Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const errorText = document.getElementById('errorText');
  const btn = document.getElementById('loginBtn');

  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok && data.success) {
      btn.textContent = 'Redirecting...';
      window.location.href = data.data.redirect;
    } else {
      errorText.textContent = data.message || "Couldn't sign you in";
      errorMsg.classList.remove('hidden');
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch (err) {
    errorText.textContent = "Network error. Try again.";
    errorMsg.classList.remove('hidden');
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
