<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Coordinate Finder</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #canvas-container { position: relative; display: inline-block; cursor: crosshair; }
        img { width: 1000px; display: block; border: 1px solid #ccc; }
        #log { margin-top: 20px; padding: 10px; background: #f0f0f0; border: 1px solid #ccc; max-width: 1000px; }
    </style>
</head>
<body>
    <h2>Click on the image to get coordinates</h2>
    <p>Please click where you want the <strong>Name</strong>, <strong>Date</strong>, and <strong>Membership No</strong> to appear. Note: The PDF-lib Y-axis starts from the BOTTOM.</p>
    
    <div id="canvas-container">
        <!-- Make sure to serve the image or open this HTML file directly in the folder -->
        <img src="aasw-pro/images/certificate-template.jpg" id="cert-img" alt="Certificate Template" onerror="this.src='aasw-pro/images/certificate-template.png'">
    </div>
    
    <div id="log">
        <strong>Clicked Coordinates:</strong><br/>
    </div>

    <script>
        const img = document.getElementById('cert-img');
        const log = document.getElementById('log');

        img.addEventListener('click', function(e) {
            const rect = img.getBoundingClientRect();
            // Calculate scale based on standard width 2000 x 1414
            const scaleX = 2000 / rect.width;
            const scaleY = 1414 / rect.height;

            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;
            
            // In PDF-lib, Y=0 is the bottom of the page.
            // Image top is Y=0 for browser, but Y=1414 for PDF-lib.
            const pdfLibY = 1414 - clickY;

            const info = `X: ${Math.round(clickX)}, Y (from bottom): ${Math.round(pdfLibY)} (Standard Y: ${Math.round(clickY)})`;
            log.innerHTML += info + '<br/>';
            console.log(info);
        });
    </script>
</body>
</html>
